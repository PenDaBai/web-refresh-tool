<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>刷新任务控制台</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; }
        .main-container { max-width: 500px; margin: 0 auto; height: calc(100vh - 40px); display: flex; flex-direction: column; }
        .header-card { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); margin-bottom: 16px; flex-shrink: 0; }
        h2 { color: #333; text-align: center; margin-bottom: 12px; font-size: 24px; }
        h3 { color: #444; margin-bottom: 16px; font-size: 18px; }
        .task-list-container { flex: 1; overflow-y: auto; padding-right: 8px; }
        .task-list-container::-webkit-scrollbar { width: 6px; }
        .task-list-container::-webkit-scrollbar-track { background: rgba(255,255,255,0.2); border-radius: 3px; }
        .task-list-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.4); border-radius: 3px; }
        .task-row { background: white; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); padding: 16px; margin-bottom: 12px; }
        .task-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .task-header span { font-weight: 600; color: #333; font-size: 16px; }
        .delete-btn { background: #dc3545; color: white; border: none; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 12px; transition: background 0.2s; }
        .delete-btn:hover { background: #c82333; }
        .delete-btn:disabled { background: #f5c6cb; cursor: not-allowed; }
        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 6px; color: #555; font-size: 13px; font-weight: 500; }
        input { width: 100%; padding: 8px 12px; border: 1px solid #e1e5e9; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1); }
        .radio-group { display: flex; gap: 24px; padding: 4px 0; flex-wrap: wrap; }
        .radio-group label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-weight: 400; margin-bottom: 0; white-space: nowrap; }
        .input-row { display: flex; gap: 16px; }
        .input-row .input-group { flex: 1; margin-bottom: 0; }
        .btn { padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 500; transition: all 0.2s; }
        .btn-primary { background: #667eea; color: white; width: 100%; }
        .btn-primary:hover { background: #5568d3; }
        .btn-primary:disabled { background: #aab6f4; cursor: not-allowed; }
        .btn-success { background: #28a745; color: white; width: 100%; margin-bottom: 12px; }
        .btn-success:hover { background: #218838; }
        .btn-success:disabled { background: #8fd9a8; cursor: not-allowed; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }
        .btn-danger:disabled { background: #f5c6cb; cursor: not-allowed; }
        .btn-group { display: flex; gap: 12px; margin-bottom: 16px; }
        .btn-group .btn { flex: 1; }
        .progress-container { background: white; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); padding: 16px; margin-bottom: 12px; flex-shrink: 0; display: none; }
        .progress-container h4 { text-align: center; margin-bottom: 12px; color: #444; font-size: 15px; }
        .progress-bar { width: 100%; background: #f1f3f5; border-radius: 10px; height: 12px; overflow: hidden; margin-bottom: 8px; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #28a745 0%, #20c997 100%); transition: width 0.3s; border-radius: 10px; }
        .status-text { font-size: 13px; color: #666; text-align: center; font-weight: 500; }
        .task-progress { margin-top: 12px; padding-top: 12px; border-top: 1px solid #f1f3f5; display: none; }
        .task-progress .progress-bar { height: 8px; }
        .task-progress .status-text { font-size: 12px; text-align: left; }
    </style>
</head>
<body>
<div class="main-container">
    <div class="header-card">
        <h2>🚀 网页刷新工具</h2>
        <button id="addTaskBtn" onclick="addTask()" class="btn btn-success">
            ➕ 新增任务
        </button>
        <div class="btn-group">
            <button id="startBtn" onclick="startTask()" class="btn btn-primary">开始执行所有任务</button>
            <button id="stopBtn" onclick="stopTask()" disabled class="btn btn-danger">停止所有任务</button>
        </div>
    </div>

    <!-- 总进度显示 -->
    <div class="progress-container" id="totalProgContainer">
        <h4>总进度</h4>
        <div class="progress-bar"><div class="progress-fill" id="totalProgFill"></div></div>
        <div class="status-text" id="totalStatusMsg">准备就绪</div>
    </div>

    <div class="task-list-container">
        <div id="taskList">
            <!-- 任务行模板，默认显示一行 -->
            <div class="task-row">
                <div class="task-header">
                    <span>任务 1</span>
                    <button onclick="deleteTask(this)" class="delete-btn">删除</button>
                </div>
                <div class="input-group">
                    <label>目标网址</label>
                    <input type="text" class="task-url" placeholder="例如：https://www.example.com">
                </div>
                <div class="input-group">
                    <label>功能模式</label>
                    <div class="radio-group">
                        <label>
                            <input type="radio" class="task-mode" name="mode_0" value="pv" checked> 单窗口刷PV
                        </label>
                        <label>
                            <input type="radio" class="task-mode" name="mode_0" value="uv"> 多窗口刷UV
                        </label>
                    </div>
                </div>
                <div class="input-group">
                    <label>运行模式</label>
                    <div class="radio-group">
                        <label>
                            <input type="radio" class="task-run-mode" name="run_mode_0" value="visible" checked> 可见窗口
                        </label>
                        <label>
                            <input type="radio" class="task-run-mode" name="run_mode_0" value="headless"> 后台静默
                        </label>
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label>访问次数</label>
                        <input type="number" class="task-count" value="10" min="1">
                    </div>
                    <div class="input-group">
                        <label>并行数</label>
                        <input type="number" class="task-parallel" value="1" min="1" max="10">
                    </div>
                </div>
                <!-- 单个任务进度显示 -->
                <div class="task-progress">
                    <div class="progress-bar">
                        <div class="progress-fill task-prog-fill"></div>
                    </div>
                    <div class="status-text task-status">准备就绪</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let timer;
    let taskCount = 1; // 当前任务数量

    // 新增任务行
    function addTask() {
        taskCount++;
        const taskList = document.getElementById('taskList');
        const newTask = document.querySelector('.task-row').cloneNode(true);
        
        // 更新任务编号
        newTask.querySelector('span').innerText = `任务 ${taskCount}`;
        // 更新单选框name属性，避免冲突
        newTask.querySelectorAll('.task-mode').forEach(input => input.name = `mode_${taskCount-1}`);
        newTask.querySelectorAll('.task-run-mode').forEach(input => input.name = `run_mode_${taskCount-1}`);
        // 清空输入值？不，保持默认值
        newTask.querySelector('.task-url').value = '';
        newTask.querySelector('.task-progress').style.display = 'none';
        
        taskList.appendChild(newTask);
    }

    // 删除任务行
    function deleteTask(btn) {
        const taskRows = document.querySelectorAll('.task-row');
        if(taskRows.length <= 1) {
            alert('至少保留一个任务！');
            return;
        }
        btn.closest('.task-row').remove();
        // 重新编号
        document.querySelectorAll('.task-row').forEach((row, idx) => {
            row.querySelector('span').innerText = `任务 ${idx+1}`;
        });
        taskCount--;
    }

    async function startTask() {
        const taskRows = document.querySelectorAll('.task-row');
        const tasks = [];
        let hasEmptyUrl = false;
        let hasHighParallel = false;
        let maxParallel = 0;

        // 收集所有任务配置
        taskRows.forEach((row, idx) => {
            const url = row.querySelector('.task-url').value.trim();
            if(!url) {
                alert(`任务 ${idx+1} 请输入目标网址！`);
                hasEmptyUrl = true;
                return;
            }
            const mode = row.querySelector('.task-mode:checked').value;
            const run_mode = row.querySelector('.task-run-mode:checked').value;
            let count = parseInt(row.querySelector('.task-count').value) || 10;
            let parallel_num = parseInt(row.querySelector('.task-parallel').value) || 1;
            
            // 范围校验
            parallel_num = Math.max(1, Math.min(10, parallel_num));
            count = Math.max(count, parallel_num);
            row.querySelector('.task-count').value = count;
            row.querySelector('.task-parallel').value = parallel_num;

            if(parallel_num > 5) {
                hasHighParallel = true;
                maxParallel = Math.max(maxParallel, parallel_num);
            }

            tasks.push({url, count, mode, run_mode, parallel_num});
        });

        if(hasEmptyUrl) return;

        // 高并行数确认
        if(hasHighParallel) {
            if(!confirm(`存在任务并行数大于${maxParallel}，可能会占用较多CPU/内存导致电脑卡顿，确认要继续吗？`)) {
                return;
            }
        }

        // UI 初始化
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        document.getElementById('addTaskBtn').disabled = true;
        document.querySelectorAll('.task-row button').forEach(btn => btn.disabled = true);
        document.getElementById('totalProgContainer').style.display = 'block';
        document.getElementById('totalProgFill').style.width = '0%';
        
        // 显示每个任务的进度条
        document.querySelectorAll('.task-progress').forEach(el => el.style.display = 'block');

        const response = await fetch('/start', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({tasks: tasks})
        });
        const res = await response.json();
        if(res.error) { 
            alert(res.error); 
            resetUI();
            return; 
        }

        // 开始轮询进度
        timer = setInterval(updateStatus, 1000);
    }

    async function updateStatus() {
        const response = await fetch('/status');
        const data = await response.json();

        // 更新总进度
        document.getElementById('totalProgFill').style.width = data.total_progress + '%';
        document.getElementById('totalStatusMsg').innerText = `${data.message} (总成功：${data.total_success_count}/${data.total_count})`;

        // 更新每个任务的进度
        if(data.tasks) {
            const taskRows = document.querySelectorAll('.task-row');
            data.tasks.forEach((task, idx) => {
                if(taskRows[idx]) {
                    const progFill = taskRows[idx].querySelector('.progress-fill');
                    const statusText = taskRows[idx].querySelector('.task-status');
                    progFill.style.width = task.progress + '%';
                    statusText.innerText = `${task.message} (${task.success_count}/${task.total_count})`;
                }
            });
        }

        if (!data.is_running) {
            clearInterval(timer);
            resetUI();
        }
    }

    // 重置UI状态
    function resetUI() {
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
        document.getElementById('addTaskBtn').disabled = false;
        document.querySelectorAll('.task-row button').forEach(btn => btn.disabled = false);
    }

    async function stopTask() {
        if (!confirm("确定要停止当前所有任务吗？")) {
            return;
        }
        
        const response = await fetch('/stop', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'}
        });
        const res = await response.json();
        if (res.error) {
            alert(res.error);
        } else {
            document.getElementById('stopBtn').disabled = true;
            alert(res.message);
        }
    }
    </script>
</body>
</html>
