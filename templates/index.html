<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>刷新任务控制台</title>
    <style>
        html, body { height: 100%; margin: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 400px; }
        h2 { color: #333; text-align: center; margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: #666; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; transition: background 0.3s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; }
        .progress-container { margin-top: 2rem; display: none; }
        .progress-bar { width: 100%; background: #eee; border-radius: 10px; height: 20px; overflow: hidden; margin-bottom: 10px; }
        .progress-fill { width: 0%; height: 100%; background: #28a745; transition: width 0.3s; }
        .status-text { font-size: 14px; color: #555; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h2>🚀 刷新控制台</h2>
    <h3 style="margin-bottom: 10px; color: #333;">📋 多任务配置</h3>
    <div id="taskList">
        <!-- 任务行模板，默认显示一行 -->
        <div class="task-row" style="border: 1px solid #eee; border-radius: 8px; padding: 15px; margin-bottom: 15px; background: #fafafa;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <span style="font-weight: 600; color: #555;">任务 1</span>
                <button onclick="deleteTask(this)" style="background: #dc3545; color: white; border: none; border-radius: 4px; padding: 4px 8px; cursor: pointer; font-size: 12px;">删除</button>
            </div>
            <div class="input-group">
                <label>目标网址</label>
                <input type="text" class="task-url" placeholder="例如：https://www.example.com">
            </div>
            <div class="input-group">
                <label>功能模式</label>
                <div style="display: flex; gap: 20px; padding: 5px 0;">
                    <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                        <input type="radio" class="task-mode" name="mode_0" value="pv" checked> 单窗口重复刷新（仅增加PV）
                    </label>
                    <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                        <input type="radio" class="task-mode" name="mode_0" value="uv"> 多独立窗口访问（每次算新UV）
                    </label>
                </div>
            </div>
            <div class="input-group">
                <label>运行模式</label>
                <div style="display: flex; gap: 20px; padding: 5px 0;">
                    <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                        <input type="radio" class="task-run-mode" name="run_mode_0" value="visible" checked> 可见窗口模式
                    </label>
                    <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                        <input type="radio" class="task-run-mode" name="run_mode_0" value="headless"> 后台静默模式
                    </label>
                </div>
            </div>
            <div style="display: flex; gap: 20px;">
                <div class="input-group" style="flex: 1;">
                    <label>访问次数</label>
                    <input type="number" class="task-count" value="10" min="1">
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>最大并行数</label>
                    <input type="number" class="task-parallel" value="1" min="1" max="10">
                </div>
            </div>
            <!-- 单个任务进度显示 -->
            <div class="task-progress" style="display: none; margin-top: 10px;">
                <div class="progress-bar" style="height: 12px;">
                    <div class="progress-fill task-prog-fill"></div>
                </div>
                <div class="status-text task-status" style="font-size: 12px; margin-top: 5px;">准备就绪</div>
            </div>
        </div>
    </div>

    <button id="addTaskBtn" onclick="addTask()" style="width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; margin-bottom: 15px;">
        ➕ 新增任务
    </button>

    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
        <button id="startBtn" onclick="startTask()" style="flex: 1;">开始执行所有任务</button>
        <button id="stopBtn" onclick="stopTask()" disabled style="flex: 1; background: #dc3545;">停止所有任务</button>
    </div>

    <!-- 总进度显示 -->
    <div class="progress-container" id="totalProgContainer" style="display: none;">
        <h4 style="margin-bottom: 10px; text-align: center;">总进度</h4>
        <div class="progress-bar"><div class="progress-fill" id="totalProgFill"></div></div>
        <div class="status-text" id="totalStatusMsg">准备就绪</div>
    </div>

    <div id="taskProgressList"></div>

<script>
    let timer;
    let taskCount = 1; // 当前任务数量

    // 新增任务行
    function addTask() {
        taskCount++;
        const taskList = document.getElementById('taskList');
        const newTask = document.querySelector('.task-row').cloneNode(true);
        
        // 更新任务编号
        newTask.querySelector('span').innerText = `任务 ${taskCount}`;
        // 更新单选框name属性，避免冲突
        newTask.querySelectorAll('.task-mode').forEach(input => input.name = `mode_${taskCount-1}`);
        newTask.querySelectorAll('.task-run-mode').forEach(input => input.name = `run_mode_${taskCount-1}`);
        // 清空输入值？不，保持默认值
        newTask.querySelector('.task-url').value = '';
        newTask.querySelector('.task-progress').style.display = 'none';
        
        taskList.appendChild(newTask);
    }

    // 删除任务行
    function deleteTask(btn) {
        const taskRows = document.querySelectorAll('.task-row');
        if(taskRows.length <= 1) {
            alert('至少保留一个任务！');
            return;
        }
        btn.closest('.task-row').remove();
        // 重新编号
        document.querySelectorAll('.task-row').forEach((row, idx) => {
            row.querySelector('span').innerText = `任务 ${idx+1}`;
        });
        taskCount--;
    }

    async function startTask() {
        const taskRows = document.querySelectorAll('.task-row');
        const tasks = [];
        let hasEmptyUrl = false;
        let hasHighParallel = false;
        let maxParallel = 0;

        // 收集所有任务配置
        taskRows.forEach((row, idx) => {
            const url = row.querySelector('.task-url').value.trim();
            if(!url) {
                alert(`任务 ${idx+1} 请输入目标网址！`);
                hasEmptyUrl = true;
                return;
            }
            const mode = row.querySelector('.task-mode:checked').value;
            const run_mode = row.querySelector('.task-run-mode:checked').value;
            let count = parseInt(row.querySelector('.task-count').value) || 10;
            let parallel_num = parseInt(row.querySelector('.task-parallel').value) || 1;
            
            // 范围校验
            parallel_num = Math.max(1, Math.min(10, parallel_num));
            count = Math.max(count, parallel_num);
            row.querySelector('.task-count').value = count;
            row.querySelector('.task-parallel').value = parallel_num;

            if(parallel_num > 5) {
                hasHighParallel = true;
                maxParallel = Math.max(maxParallel, parallel_num);
            }

            tasks.push({url, count, mode, run_mode, parallel_num});
        });

        if(hasEmptyUrl) return;

        // 高并行数确认
        if(hasHighParallel) {
            if(!confirm(`存在任务并行数大于${maxParallel}，可能会占用较多CPU/内存导致电脑卡顿，确认要继续吗？`)) {
                return;
            }
        }

        // UI 初始化
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        document.getElementById('addTaskBtn').disabled = true;
        document.querySelectorAll('.task-row button').forEach(btn => btn.disabled = true);
        document.getElementById('totalProgContainer').style.display = 'block';
        document.getElementById('totalProgFill').style.width = '0%';
        
        // 显示每个任务的进度条
        document.querySelectorAll('.task-progress').forEach(el => el.style.display = 'block');

        const response = await fetch('/start', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({tasks: tasks})
        });
        const res = await response.json();
        if(res.error) { 
            alert(res.error); 
            resetUI();
            return; 
        }

        // 开始轮询进度
        timer = setInterval(updateStatus, 1000);
    }

    async function updateStatus() {
        const response = await fetch('/status');
        const data = await response.json();

        // 更新总进度
        document.getElementById('totalProgFill').style.width = data.total_progress + '%';
        document.getElementById('totalStatusMsg').innerText = `${data.message} (总成功：${data.total_success_count}/${data.total_count})`;

        // 更新每个任务的进度
        if(data.tasks) {
            const taskRows = document.querySelectorAll('.task-row');
            data.tasks.forEach((task, idx) => {
                if(taskRows[idx]) {
                    const progFill = taskRows[idx].querySelector('.progress-fill');
                    const statusText = taskRows[idx].querySelector('.task-status');
                    progFill.style.width = task.progress + '%';
                    statusText.innerText = `${task.message} (${task.success_count}/${task.total_count})`;
                }
            });
        }

        if (!data.is_running) {
            clearInterval(timer);
            resetUI();
        }
    }

    // 重置UI状态
    function resetUI() {
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
        document.getElementById('addTaskBtn').disabled = false;
        document.querySelectorAll('.task-row button').forEach(btn => btn.disabled = false);
    }

    async function stopTask() {
        if (!confirm("确定要停止当前所有任务吗？")) {
            return;
        }
        
        const response = await fetch('/stop', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'}
        });
        const res = await response.json();
        if (res.error) {
            alert(res.error);
        } else {
            document.getElementById('stopBtn').disabled = true;
            alert(res.message);
        }
    }
    </script>
</body>
</html>
