<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>刷新任务控制台</title>
    <style>
        html, body { height: 100%; margin: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 400px; }
        h2 { color: #333; text-align: center; margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: #666; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; transition: background 0.3s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; }
        .progress-container { margin-top: 2rem; display: none; }
        .progress-bar { width: 100%; background: #eee; border-radius: 10px; height: 20px; overflow: hidden; margin-bottom: 10px; }
        .progress-fill { width: 0%; height: 100%; background: #28a745; transition: width 0.3s; }
        .status-text { font-size: 14px; color: #555; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h2>🚀 刷新控制台</h2>
    <div class="input-group">
        <label>目标网址</label>
        <input type="text" id="url" placeholder="例如：https://www.example.com">
    </div>
    <div class="input-group">
        <label>功能模式</label>
        <div style="display: flex; gap: 20px; padding: 5px 0;">
            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                <input type="radio" name="mode" value="pv" checked> 单窗口重复刷新（仅增加PV）
            </label>
            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                <input type="radio" name="mode" value="uv"> 多独立窗口访问（每次算新UV）
            </label>
        </div>
        <div style="font-size: 12px; color: #666; margin-top: 5px;">
            • 单窗口模式：启动一个浏览器窗口重复刷新N次，仅增加PV，UV只算1个<br>
            • 多UV模式：每次启动全新无痕浏览器访问一次，每次都是独立会话，算新UV
        </div>
    </div>
    <div class="input-group">
        <label>运行模式</label>
        <div style="display: flex; gap: 20px; padding: 5px 0;">
            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                <input type="radio" name="run_mode" value="visible" checked> 可见窗口模式（弹出浏览器窗口）
            </label>
            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                <input type="radio" name="run_mode" value="headless"> 后台静默模式（不弹出窗口，不影响操作）
            </label>
        </div>
        <div style="font-size: 12px; color: #666; margin-top: 5px;">
            • 可见窗口模式：正常弹出Chrome窗口，可以看到访问过程，适合调试<br>
            • 后台静默模式：浏览器完全后台运行，不会弹出任何窗口，不影响电脑操作
        </div>
    </div>
    <div class="input-group">
        <label>访问次数</label>
        <input type="number" id="count" value="10">
    </div>
    <div class="input-group">
        <label>最大并行数</label>
        <input type="number" id="parallel_num" value="1" min="1" max="10">
        <div style="font-size: 12px; color: #666; margin-top: 5px;">
            • 可选范围1-10，默认1（串行模式），并行数越大速度越快<br>
            • 并行数大于5时会占用较多CPU/内存，可能导致电脑卡顿，会弹出确认提示
        </div>
    </div>
    <div style="display: flex; gap: 10px;">
        <button id="startBtn" onclick="startTask()" style="flex: 1;">开始执行任务</button>
        <button id="stopBtn" onclick="stopTask()" disabled style="flex: 1; background: #dc3545;">停止任务</button>
    </div>

    <div class="progress-container" id="progContainer">
        <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
        <div class="status-text" id="statusMsg">准备就绪</div>
    </div>
</div>

<script>
    let timer;

    async function startTask() {
        const url = document.getElementById('url').value;
        let count = parseInt(document.getElementById('count').value);
        const mode = document.querySelector('input[name="mode"]:checked').value;
        const run_mode = document.querySelector('input[name="run_mode"]:checked').value;
        let parallel_num = parseInt(document.getElementById('parallel_num').value);

        if(!url) { alert("请输入目标网址"); return; }
        
        // 并行数范围校验
        if(isNaN(parallel_num) || parallel_num < 1) parallel_num = 1;
        if(parallel_num > 10) parallel_num = 10;
        document.getElementById('parallel_num').value = parallel_num;

        // 并行数大于5弹出确认提示
        if(parallel_num > 5) {
            if(!confirm(`你设置的并行数为${parallel_num}，可能会占用较多CPU/内存导致电脑卡顿，确认要继续吗？`)) {
                return;
            }
        }

        // 访问次数不能小于并行数
        if(count < parallel_num) {
            alert(`访问次数不能小于并行数${parallel_num}，已自动调整为${parallel_num}`);
            count = parallel_num;
            document.getElementById('count').value = count;
        }

        // UI 初始化
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        document.getElementById('progContainer').style.display = 'block';
        document.getElementById('progFill').style.width = '0%';

        const response = await fetch('/start', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({url: url, count: count, mode: mode, run_mode: run_mode, parallel_num: parallel_num})
        });
        const res = await response.json();
        if(res.error) { alert(res.error); document.getElementById('startBtn').disabled = false; }

        // 开始轮询进度
        timer = setInterval(updateStatus, 500);
    }

    async function updateStatus() {
        const response = await fetch('/status');
        const data = await response.json();

        document.getElementById('progFill').style.width = data.progress + '%';
        document.getElementById('statusMsg').innerText = `${data.message} (${data.success_count}/${data.total_count})`;

        if (!data.is_running) {
            clearInterval(timer);
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
        }
    }

    async function stopTask() {
        if (!confirm("确定要停止当前任务吗？")) {
            return;
        }
        
        const response = await fetch('/stop', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'}
        });
        const res = await response.json();
        if (res.error) {
            alert(res.error);
        } else {
            document.getElementById('stopBtn').disabled = true;
            alert(res.message);
        }
    }
    </script>
</body>
</html>
